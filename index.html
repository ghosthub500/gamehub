<!DOCTYPE html>
<html>
<head>
<title>GameHub</title>
<style>
body{
font-family: Arial;
background:#111;
color:white;
text-align:center;
}
.games{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
padding:20px;
}
iframe{
width:100%;
height:200px;
border:none;
}
button{
padding:10px;
font-size:20px;
}
</style>
</head>

<body>

<h1>🎮 GameHub</h1>

<button onclick="openCalc()">🧮 Calculadora</button>

<div class="games">

<iframe src="https://games.crazygames.com/en_US/shellshockers/index.html"></iframe>
<iframe src="https://games.crazygames.com/en_US/krunker/index.html"></iframe>
<iframe src="https://games.crazygames.com/en_US/slope/index.html"></iframe>
<iframe src="https://games.crazygames.com/en_US/1v1-lol/index.html"></iframe>

</div>

<script>
function openCalc(){
window.open("https://www.desmos.com/scientific");
}
</script>

</body>
</html>
